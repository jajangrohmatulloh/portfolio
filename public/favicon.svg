<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFE4C4"/>
      <stop offset="60%" style="stop-color:#F0C8A0"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Hair Back -->
  <circle cx="50" cy="42" r="24" fill="url(#hairGrad)"/>
  
  <!-- Neck -->
  <rect x="45" y="60" width="10" height="10" fill="#D4A574"/>
  
  <!-- Shoulders -->
  <ellipse cx="50" cy="82" rx="26" ry="12" fill="white"/>
  
  <!-- Face -->
  <ellipse cx="50" cy="50" rx="20" ry="22" fill="url(#faceGrad)"/>
  
  <!-- Hair Top -->
  <path d="M30 42 Q30 20 50 20 Q70 20 70 42 Q70 36 50 36 Q30 36 30 42" fill="url(#hairGrad)"/>
  
  <!-- Eyes -->
  <ellipse cx="42" cy="50" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="58" cy="50" rx="5" ry="5.5" fill="white"/>
  <circle cx="42" cy="50" r="2.8" fill="#2d2d2d"/>
  <circle cx="58" cy="50" r="2.8" fill="#2d2d2d"/>
  <circle cx="43" cy="49" r="1" fill="white"/>
  <circle cx="59" cy="49" r="1" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M38 44 Q42 42 46 44" fill="none" stroke="#3a3a3a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M54 44 Q58 42 62 44" fill="none" stroke="#3a3a3a" stroke-width="1.8" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M50 52 L48 57 Q50 58 52 57" fill="none" stroke="#C9956C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Mouth -->
  <path d="M45 63 Q50 67 55 63" fill="none" stroke="#E5735A" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- GLASSES -->
  <circle cx="42" cy="50" r="6.5" fill="none" stroke="url(#glassGrad)" stroke-width="2.5"/>
  <circle cx="58" cy="50" r="6.5" fill="none" stroke="url(#glassGrad)" stroke-width="2.5"/>
  <path d="M48 50 Q50 48 52 50" fill="none" stroke="url(#glassGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M35 50 L28 51" fill="none" stroke="url(#glassGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M65 50 L72 51" fill="none" stroke="url(#glassGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
