<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Hexagon with Code Bracket -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hexagon -->
    <path d="M50 20 L75 35 L75 65 L50 80 L25 65 L25 35 Z"/>
    
    <!-- Code Bracket Inside -->
    <path d="M42 35 L35 50 L42 65" stroke-width="2.5"/>
    <path d="M58 35 L65 50 L58 65" stroke-width="2.5"/>
    
    <!-- Forward Slash -->
    <path d="M50 38 L50 62" stroke-width="2.5"/>
  </g>
</svg>
