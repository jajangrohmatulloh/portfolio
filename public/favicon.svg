<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="skin" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D0B0"/>
      <stop offset="100%" style="stop-color:#E8B890"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#gradient)"/>
  
  <!-- Hair Back -->
  <ellipse cx="50" cy="42" rx="22" ry="24" fill="#1a1a1a"/>
  
  <!-- Neck -->
  <rect x="42" y="58" width="16" height="12" fill="#E8B890"/>
  
  <!-- Shoulders -->
  <ellipse cx="50" cy="78" rx="28" ry="18" fill="white" opacity="0.95"/>
  
  <!-- Face -->
  <ellipse cx="50" cy="48" rx="20" ry="22" fill="url(#skin)"/>
  
  <!-- Hair Front -->
  <path d="M28 40 Q30 25 50 25 Q70 25 72 40 Q72 35 50 35 Q28 35 28 40" fill="#1a1a1a"/>
  
  <!-- Eyes -->
  <ellipse cx="43" cy="48" rx="3.5" ry="4" fill="white"/>
  <ellipse cx="57" cy="48" rx="3.5" ry="4" fill="white"/>
  <circle cx="43" cy="48" r="2" fill="#1a1a1a"/>
  <circle cx="57" cy="48" r="2" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M40 42 Q43 40 46 42" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54 42 Q57 40 60 42" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M50 50 L48 54 Q50 55 52 54" fill="none" stroke="#D4A57A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Mouth -->
  <path d="M44 58 Q50 62 56 58" fill="none" stroke="#E5735A" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <ellipse cx="38" cy="54" rx="3" ry="2" fill="#FFB6A0" opacity="0.6"/>
  <ellipse cx="62" cy="54" rx="3" ry="2" fill="#FFB6A0" opacity="0.6"/>
</svg>
