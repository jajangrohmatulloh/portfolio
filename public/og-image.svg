<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8f8f8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="white" opacity="0.1"/>
  <circle cx="900" cy="150" r="60" fill="white" opacity="0.15"/>
  <circle cx="200" cy="500" r="40" fill="white" opacity="0.15"/>
  
  <!-- Main content area -->
  <rect x="150" y="140" width="900" height="350" rx="20" fill="url(#card)" opacity="0.95"/>
  
  <!-- Name -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#3B82F6" text-anchor="middle">Jajang</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#8B5CF6" text-anchor="middle">Rohmatulloh</text>
  
  <!-- Title -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#64748B" text-anchor="middle">Full-Stack Developer</text>
  
  <!-- Tech stack badges -->
  <g transform="translate(600, 500)">
    <!-- Badge 1 -->
    <rect x="-280" y="-25" width="130" height="50" rx="25" fill="#3B82F6" opacity="0.9"/>
    <text x="-215" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">React</text>
    
    <!-- Badge 2 -->
    <rect x="-140" y="-25" width="130" height="50" rx="25" fill="#8B5CF6" opacity="0.9"/>
    <text x="-75" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">Next.js</text>
    
    <!-- Badge 3 -->
    <rect x="-10" y="-25" width="130" height="50" rx="25" fill="#EC4899" opacity="0.9"/>
    <text x="55" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">Node.js</text>
    
    <!-- Badge 4 -->
    <rect x="120" y="-25" width="130" height="50" rx="25" fill="#10B981" opacity="0.9"/>
    <text x="185" y="8" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">TypeScript</text>
  </g>
  
  <!-- Portfolio URL -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.9">jajangrohmatulloh.com</text>
</svg>
